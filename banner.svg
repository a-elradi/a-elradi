<svg width="1600" height="400" viewBox="0 0 1600 400" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- 🌙 Dark Mode -->
    <linearGradient id="bg-dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <!-- ☀️ Light Mode -->
    <linearGradient id="bg-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1f5f9"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>

    <!-- Theme Switch -->
    <style>
      .dark { display: none; }
      @media (prefers-color-scheme: dark) {
        .dark { display: block; }
        .light { display: none; }
      }
    </style>
  </defs>

  <!-- ☀️ Light Version -->
  <g class="light">
    <rect width="1600" height="400" rx="20" fill="url(#bg-light)" />

    <text x="80" y="180"
          font-family="Segoe UI, sans-serif"
          font-size="64"
          fill="#0f172a"
          font-weight="600">
      Abdalla Elradi
    </text>

    <text x="80" y="240"
          font-family="Segoe UI, sans-serif"
          font-size="28"
          fill="#475569">
      Informatics Engineer • Robotics • Computer Vision • IoT
    </text>

    <rect x="80" y="270" width="300" height="4" rx="2" fill="#0ea5e9"/>
  </g>

  <!-- 🌙 Dark Version -->
  <g class="dark">
    <rect width="1600" height="400" rx="20" fill="url(#bg-dark)" />

    <text x="80" y="180"
          font-family="Segoe UI, sans-serif"
          font-size="64"
          fill="#ffffff"
          font-weight="600">
      Abdalla Elradi
    </text>

    <text x="80" y="240"
          font-family="Segoe UI, sans-serif"
          font-size="28"
          fill="#94a3b8">
      Informatics Engineer • Robotics • Computer Vision • IoT
    </text>

    <rect x="80" y="270" width="300" height="4" rx="2" fill="#38bdf8"/>
  </g>

</svg>
